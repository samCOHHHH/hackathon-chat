services:
  - type: web
    name: hackathon-chat
    runtime: node
    plan: free
    region: frankfurt
    branch: main
    buildCommand: npm install --include=dev && npx prisma generate && npx prisma migrate deploy && npm run build
    startCommand: npx tsx prisma/seed.ts && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: AUTH_TRUST_HOST
        value: "true"
      - key: DATABASE_URL
        value: file:./dev.db
      - key: AUTH_SECRET
        generateValue: true
      - key: UPLOAD_DIR
        value: ./public/uploads
      - key: MAX_UPLOAD_SIZE_MB
        value: "25"
